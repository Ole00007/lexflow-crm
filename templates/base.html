<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LexFlow – Legal Intake & Status Suite{% endblock %}</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem("lexflow-theme") || "dark";
                document.documentElement.setAttribute("data-theme", savedTheme);
            } catch (error) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..850&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --text-xs: clamp(0.7rem, 1vw, 0.75rem);
            --text-sm: clamp(0.82rem, 1vw, 0.92rem);
            --text-base: clamp(0.95rem, 1vw, 1rem);
            --text-lg: clamp(1.05rem, 1.3vw, 1.25rem);
            --text-xl: clamp(1.55rem, 3vw, 2.15rem);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.35rem;
            --radius-full: 999px;
            --font-body: "Inter", system-ui, -apple-system, sans-serif;
            --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        :root,
        [data-theme="dark"] {
            --background: #0E1117;
            --surface: #161B27;
            --surface-2: #111827;
            --surface-3: #1A2232;
            --sidebar: #111827;
            --text: #E2E8F0;
            --muted: #64748B;
            --muted-2: #94A3B8;
            --accent: #3B7DD8;
            --accent-strong: #75A7F0;
            --accent-soft: rgba(59, 125, 216, 0.14);
            --violet: #7C5CFC;
            --violet-soft: rgba(124, 92, 252, 0.16);
            --success: #10B981;
            --success-soft: rgba(16, 185, 129, 0.14);
            --warning: #F59E0B;
            --warning-soft: rgba(245, 158, 11, 0.15);
            --error: #EF4444;
            --error-soft: rgba(239, 68, 68, 0.15);
            --border: #1E2A3A;
            --border-soft: rgba(226, 232, 240, 0.08);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            --input-bg: #0F1522;
            --row-hover: rgba(59, 125, 216, 0.08);
        }

        [data-theme="light"] {
            color-scheme: light;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --surface-2: #F1F5F9;
            --surface-3: #EAF0F7;
            --sidebar: #F1F5F9;
            --text: #0F172A;
            --muted: #64748B;
            --muted-2: #475569;
            --accent: #1D4ED8;
            --accent-strong: #1E40AF;
            --accent-soft: rgba(29, 78, 216, 0.10);
            --violet: #6D5DF7;
            --violet-soft: rgba(109, 93, 247, 0.12);
            --success: #059669;
            --success-soft: rgba(5, 150, 105, 0.10);
            --warning: #D97706;
            --warning-soft: rgba(217, 119, 6, 0.12);
            --error: #DC2626;
            --error-soft: rgba(220, 38, 38, 0.10);
            --border: #E2E8F0;
            --border-soft: rgba(15, 23, 42, 0.08);
            --shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
            --input-bg: #FFFFFF;
            --row-hover: rgba(29, 78, 216, 0.06);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            text-size-adjust: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: 1.55;
            color: var(--text);
            background:
                radial-gradient(circle at 18% -10%, rgba(59, 125, 216, 0.20), transparent 28rem),
                radial-gradient(circle at 88% 0%, rgba(124, 92, 252, 0.14), transparent 26rem),
                var(--background);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image:
                linear-gradient(var(--border-soft) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.42), transparent 70%);
        }

        a {
            color: var(--accent-strong);
            font-weight: 650;
            text-decoration: none;
        }

        a:hover {
            color: var(--text);
        }

        button,
        input,
        textarea,
        select,
        a {
            transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition), transform var(--transition);
        }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .skip-link {
            position: absolute;
            left: var(--space-4);
            top: var(--space-4);
            z-index: 100;
            padding: var(--space-2) var(--space-3);
            color: #ffffff;
            background: var(--accent);
            border-radius: var(--radius-sm);
            transform: translateY(-160%);
        }

        .skip-link:focus {
            transform: translateY(0);
        }

        .shell {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: var(--space-5);
            background: color-mix(in srgb, var(--sidebar) 92%, transparent);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(18px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-8);
            color: var(--text);
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent), var(--violet));
            border-radius: 12px;
            box-shadow: 0 14px 30px rgba(59, 125, 216, 0.22);
        }

        .brand-copy small {
            display: block;
            margin-top: 0;
            color: var(--muted);
            font-size: var(--text-xs);
            font-weight: 650;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .nav-label {
            margin: var(--space-6) 0 var(--space-2);
            color: var(--muted);
            font-size: var(--text-xs);
            font-weight: 750;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-list {
            display: grid;
            gap: var(--space-1);
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 42px;
            padding: var(--space-2) var(--space-3);
            color: var(--muted-2);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 650;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface);
            border-color: var(--border);
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: var(--radius-full);
            box-shadow: 0 0 0 4px var(--success-soft);
        }

        .sidebar-card {
            margin-top: var(--space-8);
            padding: var(--space-4);
            background: linear-gradient(180deg, var(--surface), color-mix(in srgb, var(--surface) 70%, transparent));
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .sidebar-card p {
            margin: var(--space-2) 0 0;
            color: var(--muted);
            font-size: var(--text-sm);
        }

        .workspace {
            min-width: 0;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            min-height: 72px;
            padding: var(--space-4) var(--space-8);
            background: color-mix(in srgb, var(--background) 78%, transparent);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .breadcrumb {
            color: var(--muted);
            font-size: var(--text-sm);
            font-weight: 650;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            cursor: pointer;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .page {
            min-height: calc(100vh - 72px);
            padding: var(--space-8);
        }

        .card {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: var(--space-8);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }

        .stack {
            display: grid;
            gap: var(--space-6);
        }

        .section {
            padding: var(--space-5);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .section + .section {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--space-4);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: var(--space-4);
            margin: 0;
        }

        .feature {
            padding: var(--space-5);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .feature:first-child {
            grid-row: span 2;
            background:
                linear-gradient(135deg, var(--accent-soft), transparent 58%),
                var(--surface-2);
        }

        .feature p {
            margin-bottom: 0;
        }

        .eyebrow {
            margin: 0 0 var(--space-3);
            color: var(--accent-strong);
            font-size: var(--text-xs);
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 var(--space-4);
            color: var(--text);
            font-size: var(--text-xl);
            font-weight: 780;
            line-height: 1.08;
            letter-spacing: -0.055em;
        }

        h2 {
            margin: 0 0 var(--space-4);
            color: var(--text);
            font-size: var(--text-lg);
            font-weight: 750;
            letter-spacing: -0.03em;
        }

        h3 {
            margin: 0 0 var(--space-2);
            color: var(--text);
            font-size: var(--text-base);
            font-weight: 750;
        }

        p {
            margin: 0 0 var(--space-4);
        }

        .intro {
            max-width: 72ch;
            color: var(--muted-2);
            font-size: var(--text-base);
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            margin: 0;
            padding: 0 var(--space-4);
            color: #ffffff;
            background: var(--accent);
            border: 1px solid color-mix(in srgb, var(--accent) 80%, #ffffff 10%);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 750;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(59, 125, 216, 0.18);
        }

        .button:hover {
            color: #ffffff;
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .button-secondary {
            color: var(--text);
            background: var(--surface-3);
            border-color: var(--border);
            box-shadow: none;
        }

        .button-secondary:hover {
            color: var(--text);
            background: var(--surface);
        }

        label {
            display: inline-block;
            margin-bottom: var(--space-2);
            color: var(--text);
            font-size: var(--text-sm);
            font-weight: 720;
        }

        input,
        select,
        textarea {
            width: 100%;
            min-height: 44px;
            padding: var(--space-3);
            color: var(--text);
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font: inherit;
        }

        input[type="file"] {
            padding: var(--space-2);
            color: var(--muted-2);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        textarea {
            resize: vertical;
        }

        small {
            display: block;
            margin-top: var(--space-2);
            color: var(--muted);
            font-size: var(--text-xs);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }

        th,
        td {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        tr:hover td {
            background: var(--row-hover);
        }

        th {
            color: var(--muted-2);
            background: var(--surface-2);
            font-size: var(--text-xs);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) var(--space-3);
            color: var(--success);
            background: var(--success-soft);
            border: 1px solid color-mix(in srgb, var(--success) 36%, transparent);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 800;
            white-space: nowrap;
        }

        .badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: var(--radius-full);
        }

        .notice {
            padding: var(--space-4);
            color: var(--muted-2);
            background: var(--accent-soft);
            border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
        }

        .notice p:last-child {
            margin-bottom: 0;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: center;
        }

        .meta-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--space-3) var(--space-5);
        }

        .meta-list p {
            margin: 0;
        }

        .timeline {
            display: grid;
            gap: var(--space-3);
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .timeline li {
            padding: var(--space-4);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .progress-list {
            display: grid;
            gap: var(--space-2);
            margin: 0;
            padding-left: var(--space-6);
        }

        .progress-current {
            color: var(--success);
            font-weight: 850;
        }

        .status-display {
            display: grid;
            gap: var(--space-2);
            padding: var(--space-5);
            background:
                linear-gradient(135deg, var(--success-soft), transparent 60%),
                var(--surface);
            border: 1px solid color-mix(in srgb, var(--success) 28%, transparent);
            border-radius: var(--radius-lg);
        }

        .status-display strong {
            color: var(--success);
            font-size: var(--text-lg);
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                height: auto;
                padding: var(--space-4);
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .brand {
                margin-bottom: var(--space-4);
            }

            .nav-list {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .sidebar-card,
            .nav-label {
                display: none;
            }

            .topbar {
                padding: var(--space-3) var(--space-4);
            }

            .page {
                padding: var(--space-4);
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: var(--space-4);
                border-radius: var(--radius-lg);
            }

            .grid,
            .feature-grid,
            .meta-list {
                grid-template-columns: 1fr;
            }

            .feature:first-child {
                grid-row: auto;
            }

            .nav-list {
                grid-template-columns: 1fr;
            }

            .breadcrumb {
                display: none;
            }

            .topbar {
                justify-content: flex-end;
            }

            th,
            td {
                padding: var(--space-3);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="shell">
        <aside class="sidebar" aria-label="LexFlow workspace navigation">
            <a class="brand" href="{{ url_for('index') }}" aria-label="LexFlow home">
                <span class="brand-mark" aria-hidden="true">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                        <path d="M6 4h8.5L19 8.5V20H6V4Z" stroke="currentColor" stroke-width="1.8" />
                        <path d="M14 4v5h5" stroke="currentColor" stroke-width="1.8" />
                        <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </span>
                <span class="brand-copy">
                    LexFlow
                    <small>Legal Intake</small>
                </span>
            </a>

            <p class="nav-label">Workspace</p>
            <ul class="nav-list">
                <li><a class="nav-link" href="{{ url_for('index') }}">New intake <span class="nav-dot" aria-hidden="true"></span></a></li>
                <li><a class="nav-link" href="{{ url_for('admin') }}">Staff matters</a></li>
                <li><a class="nav-link" href="{{ url_for('load_demo') }}">Demo data</a></li>
            </ul>

            <div class="sidebar-card">
                <h3>Trusted Legal Intelligence</h3>
                <p>Private intake, discreet document receipt, and clear client-facing status updates.</p>
            </div>
        </aside>

        <div class="workspace">
            <header class="topbar">
                <div class="breadcrumb">LexFlow / Confidential workflow suite</div>
                <div class="topbar-actions">
                    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light mode">
                        <svg data-theme-icon width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </header>

            <main class="page" id="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        (function () {
            var root = document.documentElement;
            var toggle = document.querySelector("[data-theme-toggle]");
            var icon = document.querySelector("[data-theme-icon]");

            function render(theme) {
                root.setAttribute("data-theme", theme);
                if (!toggle || !icon) return;
                toggle.setAttribute("aria-label", "Switch to " + (theme === "dark" ? "light" : "dark") + " mode");
                icon.innerHTML = theme === "dark"
                    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />'
                    : '<circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round" />';
            }

            function getTheme() {
                try {
                    return localStorage.getItem("lexflow-theme") || "dark";
                } catch (error) {
                    return "dark";
                }
            }

            render(getTheme());

            if (toggle) {
                toggle.addEventListener("click", function () {
                    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
                    try {
                        localStorage.setItem("lexflow-theme", next);
                    } catch (error) {}
                    render(next);
                });
            }
        })();
    </script>
</body>
</html>
